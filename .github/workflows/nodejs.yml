# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [ master ]
    paths:
      - "AutoTest.Web/ClientApp/**"
      - ".github/workflows/nodejs.yml"
  pull_request:
    branches: [ master ]
    paths:
      - "AutoTest.Web/ClientApp/**"
      - ".github/workflows/nodejs.yml"

concurrency:
  group: node-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
    CI: true

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: yarn
        cache-dependency-path: AutoTest.Web/ClientApp/yarn.lock
    - run: yarn --cwd ./AutoTest.Web/ClientApp install --frozen-lockfile
    - run: yarn --cwd ./AutoTest.Web/ClientApp lint
    - run: yarn --cwd ./AutoTest.Web/ClientApp preact-cli build --no-esm
    - run: yarn --cwd ./AutoTest.Web/ClientApp test
